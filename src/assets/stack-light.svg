<svg xmlns="http://www.w3.org/2000/svg" width="500" height="40">
  <style>
    .terminal {
      font-family: "Fira Code", "JetBrains Mono", monospace;
      font-size: 20px;
      font-weight: bold;
    }

    .user { fill: #5f00dc; }
    .path { fill: #c50303; }
    .command { fill: #000000; } 
    .symbol { fill: #000000; }    

    .cursor {
      fill: #f8f8f2;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>

  <text x="10" y="28" class="terminal">
    <tspan class="symbol">&gt; </tspan>
    <tspan class="user">code-d-garcia@root</tspan>
    <tspan class="path">:~$ </tspan>
    <tspan class="command">ls stack/</tspan>
  </text>
</svg>
